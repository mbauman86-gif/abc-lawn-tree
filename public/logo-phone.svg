<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 50" fill="none">
  <!-- Compact single-line with phone number - for vehicle doors/tailgates -->
  <g transform="translate(0, 2)">
    <!-- Mini tree icon -->
    <circle cx="20" cy="14" r="11" fill="#6B1D2A"/>
    <circle cx="12" cy="18" r="7" fill="#6B1D2A"/>
    <circle cx="28" cy="18" r="7" fill="#6B1D2A"/>
    <circle cx="20" cy="10" r="7" fill="#8B2E3D"/>
    <circle cx="15" cy="14" r="5.5" fill="#8B2E3D"/>
    <circle cx="25" cy="14" r="5.5" fill="#8B2E3D"/>
    <rect x="18" y="24" width="4" height="12" rx="1" fill="#C8963E"/>
    <path d="M17 34 Q15 36 12 37" stroke="#C8963E" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M23 34 Q25 36 28 37" stroke="#C8963E" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <circle cx="17" cy="11" r="1.5" fill="#C8963E" opacity="0.7"/>
