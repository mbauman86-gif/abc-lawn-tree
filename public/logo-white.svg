<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Tree icon - white/gold version for dark backgrounds -->
  <g transform="translate(0, 4)">
    <!-- Canopy -->
    <circle cx="36" cy="24" r="20" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="22" cy="30" r="14" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="50" cy="30" r="14" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="36" cy="16" r="12" fill="#FFFFFF"/>
    <circle cx="26" cy="24" r="10" fill="#FFFFFF"/>
    <circle cx="46" cy="24" r="10" fill="#FFFFFF"/>
    <!-- Trunk -->
    <rect x="32" y="40" width="8" height="24" rx="2" fill="#C8963E"/>
    <!-- Roots -->
    <path d="M30 60 Q26 64 20 66" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M42 60 Q46 64 52 66" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M36 64 L36 68" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Gold leaf accents -->
    <circle cx="30" cy="18" r="2.5" fill="#C8963E" opacity="0.7"/>
    <circle cx="42" cy="20" r="2" fill="#C8963E" opacity="0.6"/>
    <circle cx="36" cy="12" r="1.5" fill="#C8963E" opacity="0.5"/>
  </g>

  <!-- Text - white -->
  <g transform="translate(76, 0)">
    <text x="0" y="38" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="900" letter-spacing="-1" fill="#FFFFFF">ABC</text>
    <text x="0" y="60" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#C8963E">LAWN &amp; TREE</text>
    <rect x="0" y="66" width="170" height="2" rx="1" fill="#C8963E" opacity="0.4"/>
    <text x="0" y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="2.5" fill="rgba(255,255,255,0.6)">EST. 1998 · WILLOW SPRINGS, NC</text>
  </g>
</svg>