<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Tree icon centered -->
  <g transform="translate(64, 0)">
    <!-- Canopy -->
    <circle cx="36" cy="24" r="20" fill="#6B1D2A"/>
    <circle cx="22" cy="30" r="14" fill="#6B1D2A"/>
    <circle cx="50" cy="30" r="14" fill="#6B1D2A"/>
    <circle cx="36" cy="16" r="12" fill="#8B2E3D"/>
    <circle cx="26" cy="24" r="10" fill="#8B2E3D"/>
    <circle cx="46" cy="24" r="10" fill="#8B2E3D"/>
    <!-- Trunk -->
    <rect x="32" y="40" width="8" height="24" rx="2" fill="#C8963E"/>
    <!-- Roots -->
    <path d="M30 60 Q26 64 20 66" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M42 60 Q46 64 52 66" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M36 64 L36 68" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Gold leaf accents -->
    <circle cx="30" cy="18" r="2.5" fill="#C8963E" opacity="0.7"/>
    <circle cx="42" cy="20" r="2" fill="#C8963E" opacity="0.6"/>
    <circle cx="36" cy="12" r="1.5" fill="#C8963E" opacity="0.5"/>
  </g>

  <!-- ABC text centered -->
  <text x="100" y="100" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="40" font-weight="900" letter-spacing="-1" fill="#6B1D2A">ABC</text>
  <!-- LAWN & TREE -->
  <text x="100" y="122" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#C8963E">LAWN &amp; TREE</text>
  <!-- Gold underline -->
  <rect x="30" y="128" width="140" height="2" rx="1" fill="#C8963E" opacity="0.4"/>
  <!-- Est. line -->
  <text x="100" y="145" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="2.5" fill="#5A5A5A">EST. 1998 · WILLOW SPRINGS, NC</text>
</svg>