<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" fill="none">
  <!-- Background -->
  <rect width="72" height="72" rx="16" fill="#6B1D2A"/>

  <!-- Tree canopy -->
  <circle cx="36" cy="24" r="16" fill="#8B2E3D"/>
  <circle cx="25" cy="29" r="11" fill="#8B2E3D"/>
  <circle cx="47" cy="29" r="11" fill="#8B2E3D"/>
  <circle cx="36" cy="18" r="10" fill="#9B3E4D"/>
  <circle cx="28" cy="24" r="8" fill="#9B3E4D"/>
  <circle cx="44" cy="24" r="8" fill="#9B3E4D"/>

  <!-- Gold trunk -->
  <rect x="33" y="38" width="6" height="18" rx="2" fill="#C8963E"/>

  <!-- Gold roots -->
  <path d="M32 52 Q28 55 23 57" stroke="#C8963E" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M40 52 Q44 55 49 57" stroke="#C8963E" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M36 54 L36 58" stroke="#C8963E" stroke-width="2" stroke-linecap="round"/>

  <!-- Gold leaf accents -->
  <circle cx="30" cy="19" r="2" fill="#C8963E" opacity="0.7"/>
  <circle cx="42" cy="21" r="1.5" fill="#C8963E" opacity="0.6"/>
  <circle cx="36" cy="14" r="1.5" fill="#C8963E" opacity="0.5"/>

  <!-- ABC text at bottom -->
  <text x="36" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="900" letter-spacing="2" fill="#C8963E" opacity="0.6">ABC</text>
</svg>
